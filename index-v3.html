<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1C1917" />
  <meta name="description" content="Van Oude Dingen — vintage meubels en woonaccessoires" />
  <title>Van Oude Dingen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Special+Elite&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #F5F2ED;
      --ink:       #1C1917;
      --ink-soft:  #8C8078;
      --accent:    #C4611F;
      --white:     #FFFFFF;
      --gap:       2px;
      --header-h:  56px;
      --ff-display: 'Cormorant Garamond', Georgia, serif;
      --ff-header: 'Special Elite', 'Courier New', monospace;
      --ff-ui:      'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--ff-ui);
      font-weight: 300;
      overscroll-behavior-y: none;
      /* NO padding-top: hero bleeds under the floating header */
    }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }
    a   { color: inherit; text-decoration: none; }
    button { border: none; background: none; cursor: pointer; font-family: inherit; }

    /* ── HEADER ──────────────────────────────────────────────
       Starts fully transparent over the hero.
       On scroll → frosted-glass. On fast-down-scroll → hides.
    ── */
    .header {
      position: fixed;
      top: 12px;
      left: 12px; right: 12px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 16px;
      border-radius: 6px;

      /* always black pill */
      background: rgba(10, 8, 7, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 2px 20px rgba(0,0,0,0.35);
    }
    .header.scrolled {
      box-shadow: 0 4px 28px rgba(0,0,0,0.45);
    }
    .header.hidden { transform: translateY(calc(-100% - 20px)); }


    .header__logo {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1px;
    }
    .header__logo-main {
      font-family: var(--ff-header);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--white);
      line-height: 1;
      white-space: nowrap;
    }
    .header__logo-sub {
      font-family: var(--ff-header);
      font-size: 0.55rem;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.45);
      line-height: 1;
      white-space: nowrap;
    }

    .header__actions { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }

    /* back-to-top: hidden at page top, appears on scroll */
    .header__top-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      margin-right: 2px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .header__top-btn.visible {
      opacity: 1;
      pointer-events: all;
    }
    .header__top-btn:active { background: rgba(255,255,255,0.14); }
    .header__top-btn svg {
      width: 16px; height: 16px;
      stroke: rgba(255,255,255,0.7); fill: none; stroke-width: 2;
    }
    .header__btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .header__btn:active { background: rgba(255,255,255,0.12); }
    .header__btn svg {
      width: 20px; height: 20px;
      stroke: var(--white); fill: none; stroke-width: 1.5;
    }

    /* ── HERO ─────────────────────────────────────────────────
       Full viewport height, bleeds behind the header.
       Swap <img> for <video autoplay muted loop playsinline>
       when a hosted mp4 is available — same CSS applies.
    ── */
    .hero {
      position: relative;
      width: 100%;
      height: 60vh;
      min-height: 360px;
      max-height: 560px;
      overflow: hidden;
      background: #1a1613;
    }

    .hero__media {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;

    }

    .hero__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(28,25,23,0.42) 0%,        /* dark at top behind header */
        transparent 28%,
        transparent 42%,
        rgba(28,25,23,0.78) 100%        /* dark at bottom for text */
      );
    }

    .hero__content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 36px 20px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom));
    }

    .hero__label {
      font-size: 0.62rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.52);
      margin-bottom: 10px;
      opacity: 0; transform: translateY(10px);
      animation: fadeUp 0.7s 0.4s forwards ease-out;
    }
    .hero__title {
      font-family: var(--ff-display);
      font-size: clamp(2.1rem, 8.5vw, 3.5rem);
      font-weight: 300; line-height: 1.07;
      color: var(--white);
      margin-bottom: 24px;
      opacity: 0; transform: translateY(16px);
      animation: fadeUp 0.8s 0.6s forwards ease-out;
    }
    .hero__title em { font-style: italic; color: rgba(255,255,255,0.68); }

    .hero__cta {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 22px;
      background: var(--white); color: var(--ink);
      font-size: 0.7rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      border-radius: 2px;
      opacity: 0; transform: translateY(10px);
      animation: fadeUp 0.7s 0.85s forwards ease-out;
    }
    .hero__cta svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }

    @keyframes fadeUp {
      to { opacity: 1; transform: none; }
    }

    /* animated scroll line, bottom-right */
    .hero__scroll {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom));
      right: 20px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      opacity: 0;
      animation: fadeUp 1s 1.3s forwards ease-out;
    }
    .hero__scroll-line {
      width: 1px; height: 44px;
      background: rgba(255,255,255,0.2);
      position: relative; overflow: hidden;
    }
    .hero__scroll-line::after {
      content: '';
      position: absolute; top: -100%; width: 100%; height: 100%;
      background: rgba(255,255,255,0.7);
      animation: scrollTick 1.9s 1.8s infinite ease-in-out;
    }
    @keyframes scrollTick {
      0%   { top: -100%; }
      100% { top: 100%; }
    }
    .hero__scroll span {
      font-size: 0.54rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      writing-mode: vertical-rl;
    }

    /* ── SECTION HEADER ──────────────────────────────────────── */
    .section-header {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 36px 16px 16px;
    }
    .section-header__title {
      font-family: var(--ff-display); font-size: 1.6rem; font-weight: 400;
    }
    .section-header__link {
      font-size: 0.68rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-soft);
      border-bottom: 1px solid var(--ink-soft); padding-bottom: 1px;
    }

    /* ── CATEGORY SWIPER — edge-to-edge ──────────────────────── */
    .cat-swiper {
      display: flex; gap: var(--gap);
      overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .cat-swiper::-webkit-scrollbar { display: none; }

    .cat-card {
      flex: 0 0 42vw; scroll-snap-align: start;
      position: relative; aspect-ratio: 3/4;
      overflow: hidden; background: #2a2320; cursor: pointer;
    }
    .cat-card--noimg {
      background: linear-gradient(135deg, #3a3330 0%, #2a2320 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .cat-card--noimg .cat-card__name {
      position: relative; bottom: auto; left: auto; right: auto;
      font-size: 1.2rem; text-align: center; padding: 0 20px;
    }
    .cat-card__img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s ease;
    }
    .cat-card:active .cat-card__img { transform: scale(1.05); }
    .cat-card__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(28,25,23,0.72) 0%, transparent 55%);
    }
    .cat-card__name {
      position: absolute; bottom: 12px; left: 10px; right: 10px;
      font-family: var(--ff-display); font-size: 1rem; font-weight: 400;
      color: var(--white); line-height: 1.2;
    }

    /* ── FILTER BAR ──────────────────────────────────────────── */
    .filter-bar-wrap {
      position: sticky;
      top: 0;                        /* default: flush with screen top */
      z-index: 90;
      background: rgba(245, 242, 237, 0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(28,25,23,0.07);
      transition: top 0.3s ease, box-shadow 0.2s ease;  /* smooth with header pill */
    }
    .filter-bar-wrap.pinned {
      box-shadow: 0 2px 14px rgba(28,25,23,0.09);
    }
    .filter-bar {
      display: flex; gap: 8px;
      padding: 10px 16px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-pill {
      flex: 0 0 auto; padding: 7px 14px;
      border-radius: 2px; border: 1px solid rgba(28,25,23,0.2);
      font-size: 0.68rem; font-weight: 500; letter-spacing: 0.08em;
      color: var(--ink); white-space: nowrap; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .filter-pill.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

    /* ── PRODUCT GRID — edge-to-edge ─────────────────────────── */
    .product-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap);
    }
    .product-card {
      position: relative; cursor: pointer;
      background: #2a2320; overflow: hidden;
    }
    .product-card--wide { grid-column: 1 / -1; }
    .product-card--wide .product-card__img-wrap { aspect-ratio: 16/10; }
    .product-card__img-wrap { aspect-ratio: 3/4; overflow: hidden; }
    .product-card__img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s ease;
    }
    .product-card:active .product-card__img { transform: scale(1.04); }
    .product-card__info { padding: 10px 12px 14px; background: var(--bg); }
    .product-card__cat {
      font-size: 0.58rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 4px;
    }
    .product-card__name {
      font-family: var(--ff-display); font-size: 0.95rem;
      font-weight: 400; line-height: 1.3;
    }
    .product-card__price { font-size: 0.78rem; color: var(--ink-soft); margin-top: 4px; }
    
    /* Product card hover overlay (desktop only) */
    .product-card__overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(28,25,23,0.92);
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
      overflow-y: auto;
    }
    .product-card__overlay-title {
      font-family: var(--ff-display);
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .product-card__overlay-cat {
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .product-card__overlay-desc {
      font-size: 0.82rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-card__overlay-price {
      font-size: 1rem;
      font-weight: 500;
      color: var(--white);
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .editorial {
      position: relative; width: 100%; aspect-ratio: 3/4;
      overflow: hidden; background: #2a2320; cursor: pointer;
    }
    .editorial__img { width: 100%; height: 100%; object-fit: cover; }
    .editorial__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(28,25,23,0.82) 0%, transparent 60%);
    }
    .editorial__content { position: absolute; bottom: 0; left: 0; right: 0; padding: 28px 20px; }
    .editorial__label {
      font-size: 0.6rem; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 8px;
    }
    .editorial__title {
      font-family: var(--ff-display); font-size: clamp(1.6rem,6vw,2.6rem);
      font-weight: 300; line-height: 1.1; color: var(--white); margin-bottom: 16px;
    }
    .editorial__title em { font-style: italic; }
    .editorial__link {
      font-size: 0.68rem; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.65);
      border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 2px;
    }


    /* ── SKELETON ────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, #E0DBD4 25%, #EAE5DE 50%, #E0DBD4 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── FADE-UP ─────────────────────────────────────────────── */
    .fade-up { opacity: 0; transform: translateY(18px); transition: opacity 0.55s ease, transform 0.55s ease; }
    .fade-up.visible { opacity: 1; transform: none; }

    /* ── DETAIL PANEL ────────────────────────────────────────── */
    .panel-overlay {
      position: fixed; inset: 0; background: rgba(28,25,23,0.52);
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .panel-overlay.open { opacity: 1; pointer-events: all; }

    .detail-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-height: 93vh; background: var(--bg);
      z-index: 201; border-radius: 14px 14px 0 0;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .detail-panel.open { transform: none; }
    
    /* Sticky header with drag handle and close button */
    .detail-panel__header {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      padding-bottom: 8px;
    }
    .detail-panel__drag {
      width: 40px; height: 4px; background: rgba(28,25,23,0.14);
      border-radius: 2px; margin: 14px auto 0;
    }
    .detail-panel__close {
      position: absolute; top: 20px; right: 16px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(245,242,237,0.92); border-radius: 50%; z-index: 5;
    }
    .detail-panel__close svg { width: 18px; height: 18px; stroke: var(--ink); fill: none; stroke-width: 2; }
    
    .detail-panel__body { padding: 22px 20px 20px; }
    .detail-panel__cat {
      font-size: 0.6rem; font-weight: 500; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
    }
    .detail-panel__title {
      font-family: var(--ff-display); font-size: 1.75rem;
      font-weight: 300; line-height: 1.15; margin-bottom: 8px;
    }
    .detail-panel__price {
      font-size: 1rem; font-weight: 500; margin-bottom: 16px;
    }
    .detail-panel__desc-wrap {
      margin-bottom: 20px;
    }
    .detail-panel__desc {
      font-size: 0.84rem; line-height: 1.75; color: var(--ink-soft);
      /* paragraph spacing handled via <p> tags */
    }
    /* Email links in description */
    .detail-panel__email {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .detail-panel__email:hover {
      color: var(--ink);
    }
    
    /* Image gallery at bottom of detail panel */
    .detail-panel__gallery {
      display: flex; gap: var(--gap);
      overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding: 0 20px 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--ink-soft) rgba(28,25,23,0.1);
    }
    .detail-panel__gallery::-webkit-scrollbar {
      display: block;
      height: 6px;
    }
    .detail-panel__gallery::-webkit-scrollbar-track {
      background: rgba(28,25,23,0.1);
      border-radius: 3px;
    }
    .detail-panel__gallery::-webkit-scrollbar-thumb {
      background: var(--ink-soft);
      border-radius: 3px;
    }
    .detail-panel__gallery-img {
      flex: 0 0 70vw;
      aspect-ratio: 3/4;
      object-fit: cover;
      scroll-snap-align: center;
      border-radius: 0;
      background: #1a1613;
    }
    @media (min-width: 640px) {
      .detail-panel__gallery-img {
        flex: 0 0 50vw;
      }
    }
    @media (min-width: 1024px) {
      .detail-panel__gallery-img {
        flex: 0 0 30vw;
        max-width: 360px;
      }
    }

    /* ── INLINE EDITORIAL CARD (mixed into product grid) ────── */
    .editorial-card {
      grid-column: 1 / -1;
      position: relative;
      overflow: hidden;
      background: #1a1613;
      cursor: pointer;
      aspect-ratio: 16/9;
    }
    .editorial-card__img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .editorial-card:active .editorial-card__img { transform: scale(1.03); }
    .editorial-card__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to right,
        rgba(28,25,23,0.82) 0%,
        rgba(28,25,23,0.3) 60%,
        transparent 100%
      );
    }
    .editorial-card__content {
      position: absolute;
      top: 50%; left: 20px;
      transform: translateY(-50%);
      max-width: 65%;
    }
    .editorial-card__label {
      font-size: 0.58rem; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 6px;
    }
    .editorial-card__title {
      font-family: var(--ff-display);
      font-size: clamp(1.2rem, 4.5vw, 1.8rem);
      font-weight: 300; line-height: 1.15;
      color: var(--white); margin-bottom: 10px;
    }
    .editorial-card__title em { font-style: italic; }
    .editorial-card__link {
      font-size: 0.62rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      border-bottom: 1px solid rgba(255,255,255,0.25);
      padding-bottom: 2px;
    }
  /* ── Hamburger Menu Drawer ────────────────────────────── */
.menu-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
}
.menu-overlay.open { opacity: 1; pointer-events: all; }

.menu-drawer {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--ink);
  z-index: 201;
  transform: translateX(-100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex; flex-direction: column;
  overflow: hidden; /* drawer zelf scrollt NIET */
}
.menu-drawer.open { transform: translateX(0%); }

/* sticky header met close-button */
.menu-drawer__header {
  flex-shrink: 0;
  height: 64px;
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 16px;
  background: var(--ink);
}

.menu-drawer__close {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.1); border-radius: 50%;
}
.menu-drawer__close svg { width: 18px; height: 18px; stroke: var(--white); fill: none; stroke-width: 2; }

/* scrollbare items — scroll stopt als laatste item volledig in beeld is */
.menu-drawer__items {
  flex: 1 1 auto;
  display: flex; flex-direction: column;
  gap: var(--gap);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: y proximity;
}

/* laatste item krijgt snap-align end → scroll stopt als het volledig zichtbaar is */
.menu-item-card:last-child {
  scroll-snap-align: end;
}

.menu-item-card {
  position: relative;
  width: 100%;
  flex: 0 0 40vh;
  overflow: hidden;
  background: #2a2320;
  cursor: pointer;
}

.menu-item-card__img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s ease;
}
.menu-item-card:active .menu-item-card__img { transform: scale(1.05); }

.menu-item-card__overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.15);
}

.menu-item-card__name {
  position: absolute; bottom: 12px; left: 16px;
  font-family: var(--ff-display);
  font-size: 1.5rem; font-weight: 400;
  color: var(--white);
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  pointer-events: none;
}

.menu-drawer__social {
  flex-shrink: 0;
  background: var(--ink);
  padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
  display: flex; justify-content: center; gap: 24px;
}

.menu-drawer__social a { display: block; width: 24px; height: 24px; }
.menu-drawer__social svg { width: 100%; height: 100%; stroke: var(--white); fill: none; stroke-width: 1.5; }

/* ── Fullscreen Page Content Panel ───────────────────── */
/* page-overlay can reuse .panel-overlay, or define a new one if needed for distinct background */
.page-panel {
  position: fixed; inset: 0;
  background: var(--ink); /* Black background */
  z-index: 300; /* Higher than menu drawer */
  transform: translateX(100%); /* Slide in from right */
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex; flex-direction: column;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.page-panel.open { transform: translateX(0%); }

.page-panel__close {
  position: absolute; top: 20px; right: 16px;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 5;
}
.page-panel__close svg { width: 18px; height: 18px; stroke: var(--white); fill: none; stroke-width: 2; }

.page-panel__content {
  padding: 60px 20px 40px; /* Space for close button and bottom padding */
  flex-grow: 1;
  color: var(--white);
  /* Basic typography for WP content */
  font-family: var(--ff-ui);
  line-height: 1.6;
}

.page-panel__content h1, .page-panel__content h2, .page-panel__content h3 {
  font-family: var(--ff-display);
  font-weight: 300;
  margin-top: 1.5em; margin-bottom: 0.5em;
}
.page-panel__content h1 { font-size: 2.2rem; }
.page-panel__content h2 { font-size: 1.8rem; }
.page-panel__content h3 { font-size: 1.4rem; }

.page-panel__content p {
  margin-bottom: 1em;
}

.page-panel__content img {
  max-width: 100%; height: auto;
  display: block; margin: 1.5em auto;
  border-radius: 4px;
}

/* Specific CSS for page-panel__hero-img */
.page-panel__hero-img {
  width: 100%;
  max-height: 40vh;
  object-fit: cover;
  margin-top: 0;
  margin-bottom: 2em;
}

/* Gallery in page panel (In De Media etc.) */
.page-panel__gallery {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 0 20px 20px;
  margin: 0 -20px 8px;
}
.page-panel__gallery::-webkit-scrollbar { display: none; }
.page-panel__gallery-img {
  flex: 0 0 78vw;
  max-width: 340px;
  aspect-ratio: 3/4;
  object-fit: cover;
  scroll-snap-align: start;
  border-radius: 4px;
  background: #2a2320;
  display: block;
}
.page-panel__gallery-link {
  flex: 0 0 78vw;
  max-width: 340px;
  display: block;
  scroll-snap-align: start;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.page-panel__gallery-link .page-panel__gallery-img {
  flex: none;
  width: 100%;
  max-width: none;
}
/* Tap-to-open cue on linked gallery images */
.page-panel__gallery-link::after {
  content: 'Klik om te lezen →';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 10px 14px;
  background: linear-gradient(transparent, rgba(0,0,0,0.72));
  color: rgba(255,255,255,0.85);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.08em;
}

/* Inline text links inside page panel body */
.page-panel__link {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* ───────────────────────────────────────────────────────────
   RESPONSIVE MEDIA QUERIES - Tablet & Desktop
   ─────────────────────────────────────────────────────────── */

/* ── TABLET (640px and up) ───────────────────────────────── */
@media (min-width: 640px) {
  /* Product grid: 3 columns */
  .product-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  /* Category cards: slightly larger */
  .cat-card {
    flex: 0 0 30vw;
  }

  /* Hero: adjust height */
  .hero {
    height: 65vh;
    min-height: 400px;
  }

  /* Editorial card in grid: 3-column span */
  .editorial-card {
    aspect-ratio: 2/1;
  }

  /* Detail panel: max-width on larger screens */
  .detail-panel {
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    max-width: 560px;
    border-radius: 14px 14px 0 0;
  }
  .detail-panel.open {
    transform: translateX(-50%) translateY(0);
  }

  /* Page panel: max-width */
  .page-panel {
    left: auto;
    right: 0;
    width: 60%;
    max-width: 720px;
    transform: translateX(100%);
  }
  .page-panel.open {
    transform: translateX(0%);
  }
}

/* ── DESKTOP (1024px and up) ─────────────────────────────── */
@media (min-width: 1024px) {
  /* Constrain main content width */
  body {
    max-width: 1440px;
    margin: 0 auto;
  }

  /* Header: wider, centered */
  .header {
    left: 50%;
    right: auto;
    transform: translateX(-50%);
    max-width: 1400px;
    width: calc(100% - 24px);
  }
  .header.hidden {
    transform: translateX(-50%) translateY(calc(-100% - 20px));
  }

  /* Hero: taller, more dramatic */
  .hero {
    height: 70vh;
    min-height: 450px;
    max-height: 650px;
  }

  /* Product grid: 4 columns */
  .product-grid {
    grid-template-columns: repeat(4, 1fr);
  }

  /* Wide product card spans 2 columns */
  .product-card--wide {
    grid-column: span 2;
  }

  /* Category swiper: horizontal scroll with visible scrollbar */
  .cat-swiper {
    flex-wrap: nowrap;
    justify-content: flex-start;
    gap: var(--gap);
    overflow-x: auto;
    scroll-behavior: smooth;
    /* Show scrollbar on desktop */
    scrollbar-width: thin;
    scrollbar-color: var(--ink-soft) rgba(28,25,23,0.1);
  }
  .cat-swiper::-webkit-scrollbar {
    display: block;
    height: 6px;
  }
  .cat-swiper::-webkit-scrollbar-track {
    background: rgba(28,25,23,0.1);
    border-radius: 3px;
  }
  .cat-swiper::-webkit-scrollbar-thumb {
    background: var(--ink-soft);
    border-radius: 3px;
  }
  .cat-swiper::-webkit-scrollbar-thumb:hover {
    background: var(--ink);
  }
  .cat-card {
    flex: 0 0 calc(12.5% - 4px);  /* ~8 categories visible, rest scrollable */
    aspect-ratio: 3/4;
  }

  /* Editorial card: larger */
  .editorial-card {
    aspect-ratio: 2/1;
  }

  /* Section headers: more padding */
  .section-header {
    padding: 48px 24px 20px;
  }

  /* Typography: scale up */
  .hero__title {
    font-size: clamp(2.8rem, 6vw, 4.2rem);
  }
  .section-header__title {
    font-size: 2rem;
  }

  /* Detail panel: centered modal style */
  .detail-panel {
    left: 50%;
    right: auto;
    max-width: 720px;
    max-height: 85vh;
    border-radius: 14px;
    bottom: 0;
    transform: translateX(-50%) translateY(100%);
  }
  .detail-panel.open {
    transform: translateX(-50%) translateY(0);
  }

  /* Menu drawer: slide from side on desktop */
  .menu-drawer {
    width: 480px;
    max-width: 80%;
  }

  /* Page panel: wider on desktop */
  .page-panel {
    width: 50%;
    max-width: 900px;
  }

  /* Hover effects for desktop */
  .cat-card:hover .cat-card__img {
    transform: scale(1.05);
  }
  .product-card:hover .product-card__img {
    transform: scale(1.04);
  }
  /* Product card hover overlay on desktop */
  .product-card:hover .product-card__overlay {
    display: block;
    opacity: 1;
  }
  .product-card:hover .product-card__info {
    opacity: 0;
  }
  .menu-item-card:hover .menu-item-card__img {
    transform: scale(1.05);
  }
  .editorial-card:hover .editorial-card__img {
    transform: scale(1.03);
  }
}

/* ── LARGE DESKTOP (1440px and up) ──────────────────────── */
@media (min-width: 1440px) {
  /* Product grid: 5 columns for very wide screens */
  .product-grid {
    grid-template-columns: repeat(5, 1fr);
  }

  /* Category cards: fixed count visible */
  .cat-card {
    flex: 0 0 calc(16.66% - 4px);
  }
}

</style>

  <!-- HERO: full-screen, starts at very top under the transparent header.

  <section class="hero" id="hero">

  <!-- CATEGORIES -->

  <div class="section-header fade-up" style="padding-top:40px">

  </div>

    <div class="filter-bar" id="filterBar"></div>
  </div>
  </div>

  <!-- EDITORIAL / INSPIRATIE -->
  <div id="editorialBlock" style="margin-top:var(--gap)"></div>

  <!-- DETAIL PANEL -->
  <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
  <aside class="detail-panel" id="detailPanel" role="dialog" aria-modal="true">
    <div class="detail-panel__header">
      <div class="detail-panel__drag"></div>
      <button class="detail-panel__close" onclick="closePanel()" aria-label="Sluiten">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="detail-panel__body">
      <p class="detail-panel__cat"  id="panelCat"></p>
      <h2 class="detail-panel__title" id="panelTitle"></h2>
      <p class="detail-panel__price"  id="panelPrice"></p>
      <div class="detail-panel__desc-wrap">
        <p class="detail-panel__desc" id="panelDesc"></p>
      </div>
    </div>
    <div class="detail-panel__gallery" id="panelGallery"></div>
  </aside>

  <script>
    const API       = 'https://vanoudedingen.nl/wp-json/wp/v2';

    /* ── VIDEO AUTOPLAY (Android/file:// fix) ────────────────
       Android Chrome requires a play() call after user gesture
       OR can block autoplay on file:// entirely.
       We attempt play() immediately; on error we hide the video
       so the hero still shows (dark background + text).
    ── */
    (function() {
      const vid = document.getElementById('heroVideo');
      if (!vid) return;
      vid.muted = true; // ensure muted before play attempt
      const tryPlay = () => {
        vid.play().catch(() => {
          // Autoplay blocked — hide the broken video element
          vid.style.display = 'none';
        });
      };
      if (vid.readyState >= 2) {
        tryPlay();
      } else {
        vid.addEventListener('canplay', tryPlay, { once: true });
        // Also try on first user interaction as last resort
        document.addEventListener('touchstart', () => vid.play().catch(() => {}), { once: true, passive: true });
      }
    })();
    const SKIP      = ['inspiratie', 'koopjeshoek'];

    let allPosts    = [];
    let cats        = {};   // id → category

    /* ── header scroll behaviour ─────────────────────────── */
    const header = document.getElementById('header');
    const btnTop = document.getElementById('btnTop');
    let prevY = 0;

    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      header.classList.toggle('scrolled', y > 20);
      // pinned shadow on filter bar when it's sticky
      const fw = document.getElementById('filterBarWrap');
      if (fw) {
        const fwTop = fw.getBoundingClientRect().top;
        fw.classList.toggle('pinned', fwTop <= 69);
      }
      // show scroll-to-top button after hero
      if (btnTop) {
        const show = y > window.innerHeight * 0.6;
        btnTop.style.opacity       = show ? '1' : '0';
        btnTop.style.pointerEvents = show ? 'auto' : 'none';
      }
      if (y > prevY + 10 && y > 100) {
        header.classList.add('hidden');
        // header gone → filter bar can move flush to top
        if (fw) fw.style.top = '0px';
      } else if (y < prevY - 6) {
        header.classList.remove('hidden');
        // header returning → push filter bar down to make room
        if (fw) fw.style.top = '68px';
      }
      prevY = y;
      const heroH = document.getElementById('hero').offsetHeight;
      const show  = y > heroH * 0.6;
    }, { passive: true });

    /* scroll to top */
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ── intersection observer for fade-up ───────────────── */
    const io = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.08 }
    );
    document.querySelectorAll('.fade-up').forEach(el => io.observe(el));

    /* ── helpers ─────────────────────────────────────────── */
    const getImg = p => {
      // 1. try featured media (works for posts)
      try { const u = p._embedded['wp:featuredmedia'][0].source_url; if (u) return u; } catch {}
      // 2. fall back: parse first <img src="..."> from page/post content HTML
      try {
        const m = (p.content?.rendered || '').match(/<img[^>]+src=["']([^"']+)["']/i);
        if (m) return m[1];
      } catch {}
      return '';
    };
    const getCatName = p => { try { return cats[p.categories[0]]?.name || ''; } catch { return ''; } };
    const getCatSlug = p => { try { return cats[p.categories[0]]?.slug || ''; } catch { return ''; } };
    const price = html => { const m = (html||'').match(/€\s*[\d.,]+/); return m ? m[0] : ''; };
    const plain = html => (html||'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
    const lastItalic = t => { const w=t.split(' '); const l=w.pop(); return w.join(' ')+(w.length?' ':'')+`<em>${l}</em>`; };
    const stripHtml = html => (html||'').replace(/<[^>]+>/g, '').trim();
    
    // Decode HTML entities (&#8217;, &nbsp;, etc.)
    const decodeHtmlEntities = html => {
      if (!html) return '';
      const txt = document.createElement('textarea');
      txt.innerHTML = html;
      return txt.value;
    };
    
    // Get clean page title, fallback to slug-based name if title is empty/HTML-only
    const getPageTitle = p => {
      const title = stripHtml(p.title?.rendered || '');
      // If title is empty or very short, use slug to generate name
      if (!title || title.length < 2) {
        const slug = p.slug || '';
        return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      }
      return title;
    };

    /* ── fetch ───────────────────────────────────────────── */
    async function fetchCats() {
      const r = await fetch(`${API}/categories?per_page=50&hide_empty=true`);
      const d = await r.json();
      d.forEach(c => cats[c.id] = c);
      return d;
    }
    async function fetchPosts(catId = null) {
      const url = `${API}/posts?per_page=24&_embed` + (catId ? `&categories=${catId}` : '');
      const r   = await fetch(url);
      allPosts  = await r.json();
      return allPosts;
    }

    /* ── render hero ─────────────────────────────────────── */
    async function renderHero() {
      // Fetch specific product for CTA link only — title is static in HTML
      try {
        const res = await fetch(`${API}/posts?slug=18490-2&_embed`);
        const posts = await res.json();
        if (posts && posts.length > 0) {
          const p = posts[0];
          // Hero CTA opens this same product
          document.getElementById('heroCta').onclick = () => openPanel(p);
        }
      } catch (e) {
        console.error('Error fetching hero product:', e);
      }
    }

    /* ── render category swiper ──────────────────────────── */
    async function renderSwiper(catList, posts) {
      const imgMap = {};
      
      // First, map images from fetched posts
      posts.forEach(p => {
        const img = getImg(p);
        if (!img) return;
        p.categories.forEach(id => {
          if (!imgMap[id]) imgMap[id] = img;
        });
      });
      
      // For categories without images, fetch 1 post from that category
      const visible = catList.filter(c => !SKIP.includes(c.slug) && c.count > 0).slice(0,10);
      const catsWithoutImg = visible.filter(c => !imgMap[c.id]);
      
      if (catsWithoutImg.length > 0) {
        const fetchPromises = catsWithoutImg.map(c =>
          fetch(`${API}/posts?per_page=1&categories=${c.id}&_embed`).then(r => r.json())
        );
        const results = await Promise.all(fetchPromises);
        results.forEach((catPosts, i) => {
          const cat = catsWithoutImg[i];
          if (catPosts.length > 0) {
            const img = getImg(catPosts[0]);
            if (img) imgMap[cat.id] = img;
          }
        });
      }

      document.getElementById('catSwiper').innerHTML = visible.map(c => {
        const hasImg = imgMap[c.id];
        return `
        <div class="cat-card${!hasImg ? ' cat-card--noimg' : ''}" onclick="filterBy(${c.id},'${c.name}')">
          ${hasImg ? `
          <img class="cat-card__img skeleton"
               src="${imgMap[c.id]}" alt="${c.name}" loading="lazy"
               onload="this.classList.remove('skeleton')"
               onerror="this.classList.remove('skeleton'); this.style.display='none'; this.parentElement.classList.add('cat-card--noimg');" />
          ` : ''}
          <div class="cat-card__overlay"></div>
          <p class="cat-card__name">${c.name}</p>
        </div>`;
      }).join('');
    }

    /* ── render filter bar ───────────────────────────────── */
    function renderFilters(catList) {
      const visible = catList.filter(c => !SKIP.includes(c.slug) && c.count > 0);
      document.getElementById('filterBar').innerHTML =
        `<button class="filter-pill active" data-id="" onclick="filterBy(null,null,this)">Alles bekijken</button>` +
        visible.map(c =>
          `<button class="filter-pill" data-id="${c.id}" onclick="filterBy(${c.id},'${c.name}',this)">${c.name}</button>`
        ).join('');
    }

    /* ── filter ──────────────────────────────────────────── */
    async function filterBy(catId, catName, pill) {
      // update active pill
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      let activePill;
      if (pill) {
        pill.classList.add('active');
        activePill = pill;
      } else {
        // called from category swiper — find matching pill or fall back to "Alles"
        const match = [...document.querySelectorAll('.filter-pill')]
          .find(p => p.dataset.id == catId);
        if (match) { match.classList.add('active'); activePill = match; }
        else { document.querySelector('.filter-pill')?.classList.add('active');
               activePill = document.querySelector('.filter-pill'); }
      }

      // fetch & render
      const posts = await fetchPosts(catId);
      await renderGrid(posts);
      renderEditorial(posts);

      // Wait for grid to render, then scroll
      setTimeout(() => {
        const grid = document.getElementById('productGrid');
        if (!grid) return;

        // Scroll to just above the product grid
        const gridRect = grid.getBoundingClientRect();
        const targetY = window.scrollY + gridRect.top - 80;

        window.scrollTo({ top: targetY, behavior: 'smooth' });

        // scroll filter bar horizontally so active pill is visible
        if (activePill) {
          const bar = document.getElementById('filterBar');
          const pillLeft   = activePill.offsetLeft;
          const pillWidth  = activePill.offsetWidth;
          const barWidth   = bar.offsetWidth;
          // center the active pill in the bar
          bar.scrollTo({ left: pillLeft - (barWidth / 2) + (pillWidth / 2), behavior: 'smooth' });
        }
      }, 150);
    }

    /* ── editorial card CSS (injected once) ─────────────── */
    const editCardStyle = `
      .edit-card {
        grid-column: 1 / -1;
        position: relative;
        aspect-ratio: 3/2;
        overflow: hidden;
        background: #1a1613;
        cursor: pointer;
      }
      .edit-card__img { width:100%; height:100%; object-fit:cover; }
      .edit-card__overlay {
        position:absolute; inset:0;
        background: linear-gradient(to top, rgba(28,25,23,0.78) 0%, transparent 55%);
      }
      .edit-card__body {
        position:absolute; bottom:0; left:0; right:0;
        padding: 20px 18px;
      }
      .edit-card__label {
        font-size:0.58rem; font-weight:500;
        letter-spacing:0.2em; text-transform:uppercase;
        color: var(--accent); margin-bottom:6px;
      }
      .edit-card__title {
        font-family: var(--ff-display);
        font-size: clamp(1.2rem,5vw,1.8rem);
        font-weight:300; line-height:1.15;
        color:#fff;
      }
      .edit-card__title em { font-style:italic; }
    `;
    if (!document.getElementById('editCardStyles')) {
      const s = document.createElement('style');
      s.id = 'editCardStyles';
      s.textContent = editCardStyle;
      document.head.appendChild(s);
    }

    /* ── pages cache (over mij + in de media) ────────────── */
    let editorialPages = null;
    async function getEditorialPages() {
      if (editorialPages) return editorialPages;
      try {
        const r = await fetch('https://vanoudedingen.nl/wp-json/wp/v2/pages?per_page=20&_embed');
        const pages = await r.json();
        // match slugs for over-mij and in-de-media
        editorialPages = pages.filter(p => {
          const s = p.slug || '';
          return s.includes('over') || s.includes('media') ||
                 (p.title?.rendered||'').toLowerCase().includes('over mij') ||
                 (p.title?.rendered||'').toLowerCase().includes('media');
        });
      } catch(e) { editorialPages = []; }
      return editorialPages;
    }

    /* ── build one editorial card element ────────────────── */
    function makeEditCard(item, label) {
      const img   = getImg(item) || '';
      const title = item.title?.rendered || '';
      const link  = item.link || '#';
      const div   = document.createElement('div');
      div.className = 'edit-card fade-up';
      div.innerHTML = `
        <img class="edit-card__img skeleton" src="${img}" alt="${title}" loading="lazy"
             onload="this.classList.remove('skeleton')" />
        <div class="edit-card__overlay"></div>
        <div class="edit-card__body">
          <p class="edit-card__label">${label}</p>
          <h3 class="edit-card__title">${lastItalic(title)}</h3>
        </div>`;
      div.onclick = () => {
        // Pages (over-mij, in-de-media): open in-app page panel
        const slug = item.slug || '';
        const matchedPage = drawerMenuPages.find(p => p.slug === slug);
        if (matchedPage) {
          window.openPagePanel(matchedPage);
        } else if (item.type === 'post' || item.content) {
          // Posts (inspiratie, illustratie etc.): open in detail panel
          openPanel(item);
        } else {
          window.open(link, '_blank', 'noopener');
        }
      };
      io.observe(div);
      return div;
    }

    /* ── render grid with editorial cards mixed in ───────── */
    async function renderGrid(posts) {
      const gridPosts = posts
        .filter(p => !p.categories.some(id => SKIP.includes(cats[id]?.slug)))
        .slice(0, 20);

      // fetch pages for editorial inserts
      const pages = await getEditorialPages();

      // build editorial inserts: pages + inspiratie posts
      const inspiratiePosts = posts
        .filter(p => p.categories.some(id => cats[id]?.slug === 'inspiratie'))
        .slice(0, 3);

      // assign labels to pages
      const editItems = [
        ...pages.map(p => {
          const t = (p.title?.rendered || '').toLowerCase();
          const label = t.includes('media') ? 'In de media' : 'Over mij';
          return { item: p, label };
        }),
        ...inspiratiePosts.map(p => ({ item: p, label: 'Inspiratie' }))
      ];

      // shuffle editorial items
      for (let i = editItems.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [editItems[i], editItems[j]] = [editItems[j], editItems[i]];
      }

      // insert one editorial card every ~6 product cards
      const INTERVAL = 6;
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      window.gridPosts = gridPosts;

      let editIdx = 0;
      gridPosts.forEach((p, i) => {
        // insert editorial card before every INTERVAL-th product
        if (i > 0 && i % INTERVAL === 0 && editIdx < editItems.length) {
          const { item, label } = editItems[editIdx++];
          grid.appendChild(makeEditCard(item, label));
        }

        const wide = i > 0 && i % 5 === 2;
        const art  = document.createElement('article');
        art.className = `product-card fade-up${wide ? ' product-card--wide' : ''}`;
        art.setAttribute('role', 'listitem');
        art.onclick = () => openPanel(gridPosts[i]);
        
        const catName = getCatName(p) || '';
        const prodTitle = p.title.rendered;
        const prodPrice = price(p.content?.rendered) || '';
        const cleanDesc = stripHtml(p.content?.rendered || '').split('\n').slice(0, 5).join('\n');
        
        art.innerHTML = `
          <div class="product-card__img-wrap">
            <img class="product-card__img skeleton"
                 src="${getImg(p)}" alt="${prodTitle}" loading="lazy"
                 onload="this.classList.remove('skeleton')" />
          </div>
          <div class="product-card__info">
            ${catName ? `<p class="product-card__cat">${catName}</p>` : ''}
            <p class="product-card__name">${prodTitle}</p>
            ${prodPrice ? `<p class="product-card__price">${prodPrice}</p>` : ''}
          </div>
          <div class="product-card__overlay">
            ${catName ? `<p class="product-card__overlay-cat">${catName}</p>` : ''}
            <p class="product-card__overlay-title">${prodTitle}</p>
            <p class="product-card__overlay-desc">${cleanDesc}</p>
            ${prodPrice ? `<p class="product-card__overlay-price">${prodPrice}</p>` : ''}
          </div>`;
        io.observe(art);
        grid.appendChild(art);
      });
    }

    /* ── render editorial (standalone block below grid) ─────
       kept minimal — grid now handles inline cards          */
    function renderEditorial(posts) {
      document.getElementById('editorialBlock').innerHTML = '';
    }

    /* ── detail panel ────────────────────────────────────── */
    function openPanel(p) {
      if (!p) return;

      document.getElementById('panelCat').textContent   = getCatName(p);
      document.getElementById('panelTitle').innerHTML = decodeHtmlEntities(p.title.rendered);
      document.getElementById('panelPrice').textContent = price(p.content?.rendered||'');

      // Extract all images from content
      const content = p.content?.rendered || '';
      const imgRegex = /<img[^>]+src=["']([^"']+)["'][^>]*>/gi;
      const images = [];
      let match;
      while ((match = imgRegex.exec(content)) !== null) {
        images.push(match[1]);
      }

      // Decode HTML entities FIRST (on raw HTML, before stripping tags)
      let cleanContent = decodeHtmlEntities(content);
      // Remove images
      cleanContent = cleanContent.replace(/<img[^>]*>/gi, '');
      // Remove script/noscript/style blocks
      cleanContent = cleanContent.replace(/<(script|noscript|style)[^>]*>[\s\S]*?<\/\1>/gi, '');
      // Convert block tags to paragraph breaks
      cleanContent = cleanContent.replace(/<\/(p|div|li|h[1-6]|blockquote)>/gi, '\n\n');
      cleanContent = cleanContent.replace(/<br[^>]*>/gi, '\n');
      // Strip remaining HTML tags
      cleanContent = cleanContent.replace(/<[^>]+>/g, '');
      // Clean up whitespace
      const descText = cleanContent.replace(/\n\s*\n/g, '\n\n').trim();

      // Split into paragraphs, make emails clickable, set as HTML
      const emailRegex = /([\w.-]+@[\w.-]+\.\w+)/gi;
      const descParas = descText.split(/\n\n+/).map(s => s.trim()).filter(Boolean);
      const formattedDesc = descParas.map(para => {
        const withBreaks = para.replace(/\n/g, '<br>');
        const withLinks = withBreaks.replace(emailRegex, '<a href="mailto:$1" class="detail-panel__email">$1</a>');
        return '<p>' + withLinks + '</p>';
      }).join('');
      document.getElementById('panelDesc').innerHTML = formattedDesc;

      // Render gallery
      const gallery = document.getElementById('panelGallery');
      if (images.length > 0) {
        gallery.innerHTML = images.map((src, i) =>
          `<img class="detail-panel__gallery-img" src="${src}" alt="${p.title.rendered} ${i > 0 ? '(' + (i + 1) + ')' : ''}" loading="lazy" />`
        ).join('');
        gallery.style.display = 'flex';
      } else {
        gallery.style.display = 'none';
      }

      document.getElementById('panelOverlay').classList.add('open');
      document.getElementById('detailPanel').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closePanel() {
      document.getElementById('panelOverlay').classList.remove('open');
      document.getElementById('detailPanel').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key==='Escape') closePanel(); });
    
    /* ── swipe-down to close detail panel ───────────────── */
    // Wait for DOM to be ready before attaching touch handlers
    setTimeout(() => {
      let touchStartY = 0;
      let touchCurrentY = 0;
      const dragHandle = document.querySelector('.detail-panel__drag');
      const detailPanel = document.getElementById('detailPanel');
      
      if (dragHandle && detailPanel) {
        dragHandle.addEventListener('touchstart', e => {
          touchStartY = e.touches[0].clientY;
          detailPanel.style.transition = 'none';
        }, { passive: true });
        
        dragHandle.addEventListener('touchmove', e => {
          touchCurrentY = e.touches[0].clientY;
          const deltaY = touchCurrentY - touchStartY;
          if (deltaY > 0) {
            detailPanel.style.transform = `translateY(${deltaY}px)`;
          }
        }, { passive: true });
        
        dragHandle.addEventListener('touchend', () => {
          const deltaY = touchCurrentY - touchStartY;
          if (deltaY > 100) {
            closePanel();
          } else {
            detailPanel.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
            detailPanel.style.transform = 'none';
          }
          touchStartY = 0;
          touchCurrentY = 0;
        });
      }
    }, 100);

    /* ── init ────────────────────────────────────────────── */
    let drawerMenuPages = []; // Global to store fetched menu pages

    // Expose functions globally for HTML onclick handlers
    window.openMenu = function() {
      const menuDrawer = document.getElementById('menuDrawer');
      const menuOverlay = document.getElementById('menuOverlay');
      if (!menuDrawer || !menuOverlay) return;
      menuDrawer.classList.add('open');
      menuOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    };

    window.closeMenu = function() {
      const menuDrawer = document.getElementById('menuDrawer');
      const menuOverlay = document.getElementById('menuOverlay');
      if (!menuDrawer || !menuOverlay) return;
      menuDrawer.classList.remove('open');
      menuOverlay.classList.remove('open');
      document.body.style.overflow = '';
    };

    window.openPagePanel = function(pageData) {
      const pagePanel = document.getElementById('pagePanel');
      const pageOverlay = document.getElementById('pageOverlay');
      const pagePanelContent = document.getElementById('pagePanelContent');
      if (!pagePanel || !pageOverlay || !pagePanelContent) return;
      if (!pageData) return;

      closeMenu();
      pagePanelContent.innerHTML = '';

      let raw = pageData.content?.rendered || '';

      // 1. Remove script/noscript/style blocks including their content
      raw = raw.replace(/<(script|noscript|style)[^>]*>[\s\S]*?<\/\1>/gi, '');

      // 2. Extract <a href><img></a> pairs as clickable gallery items
      const galleryItems = [];
      raw = raw.replace(/<a\s[^>]*href=["']([^"'#][^"']*?)["'][^>]*>\s*<img[^>]+src=["']([^"']+)["'][^>]*?(?:alt=["']([^"']*)["'])?[^>]*?>\s*<\/a>/gi,
        (_, href, src, alt) => { galleryItems.push({ href, src, alt: alt || '' }); return ''; });

      // 3. Extract remaining bare <img> tags
      raw = raw.replace(/<img[^>]+src=["']([^"']+)["'][^>]*?(?:alt=["']([^"']*)["'])?[^>]*?>/gi,
        (_, src, alt) => { galleryItems.push({ href: null, src, alt: alt || '' }); return ''; });

      // 4. Convert block-level closing tags to paragraph breaks
      raw = raw.replace(/<\/(p|div|li|h[1-6]|blockquote)>/gi, '\n\n');
      raw = raw.replace(/<br[^>]*>/gi, '\n');

      // 5. Preserve <a> links with a placeholder
      raw = raw.replace(/<a\s[^>]*href=["']([^"']+)["'][^>]*>([\s\S]*?)<\/a>/gi, (_, href, inner) => {
        const label = inner.replace(/<[^>]+>/g, '').trim();
        if (!label) return '';
        return '\u200B__H__' + href + '__L__' + label + '__E__\u200B';
      });

      // 6. Strip remaining HTML tags
      raw = raw.replace(/<[^>]+>/g, '');

      // 7. Decode HTML entities
      raw = decodeHtmlEntities(raw);

      // 8. Split into paragraphs and restore links
      const paragraphs = raw.split(/\n\n+/).map(s => s.trim()).filter(Boolean);
      const cleanContent = paragraphs.map(chunk => {
        chunk = chunk.replace(/\u200B__H__([^_]+)__L__([^_]+)__E__\u200B/g,
          (_, href, label) => '<a href="' + href + '" target="_blank" rel="noopener" class="page-panel__link">' + label + '<\/a>');
        return '<p>' + chunk.replace(/\n/g, '<br>') + '<\/p>';
      }).join('');

      // 9. Build horizontal scroll gallery
      let galleryHtml = '';
      if (galleryItems.length > 0) {
        const imgs = galleryItems.map(item => item.href
          ? '<a href="' + item.href + '" target="_blank" rel="noopener" class="page-panel__gallery-link"><img src="' + item.src + '" alt="' + item.alt + '" class="page-panel__gallery-img" loading="lazy" /><\/a>'
          : '<img src="' + item.src + '" alt="' + item.alt + '" class="page-panel__gallery-img" loading="lazy" />'
        ).join('');
        galleryHtml = '<div class="page-panel__gallery">' + imgs + '<\/div>';
      }

      // 10. Fallback hero image (only when no gallery images found)
      let heroHtml = '';
      if (galleryItems.length === 0) {
        const feat = getImg(pageData);
        if (feat) heroHtml = '<img src="' + feat + '" alt="' + getPageTitle(pageData) + '" class="page-panel__hero-img" />';
      }

      pagePanelContent.innerHTML =
        heroHtml +
        '<h1 class="page-panel__title">' + getPageTitle(pageData) + '<\/h1>' +
        galleryHtml +
        '<div class="page-panel__body">' + cleanContent + '<\/div>';

      pagePanel.classList.add('open');
      pageOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    };
    window.closePagePanel = function() {
      const pagePanel = document.getElementById('pagePanel');
      const pageOverlay = document.getElementById('pageOverlay');
      if (!pagePanel || !pageOverlay) return;
      pagePanel.classList.remove('open');
      pageOverlay.classList.remove('open');
      document.body.style.overflow = '';
    };

    window.renderDrawerMenu = function() {
      const menuItemsContainer = document.getElementById('menuItemsContainer');
      const menuSocialIcons = document.getElementById('menuSocialIcons');
      if (!menuItemsContainer || !menuSocialIcons) return;

      menuItemsContainer.innerHTML = '';

      drawerMenuPages.forEach(p => {
        const img = getImg(p) || '';
        const title = getPageTitle(p);
        const card = document.createElement('div');
        card.className = 'menu-item-card';
        card.innerHTML = `
          <img class="menu-item-card__img skeleton"
               src="${img}" alt="${title}" loading="lazy"
               onload="this.classList.remove('skeleton')" />
          <div class="menu-item-card__overlay"></div>
          <p class="menu-item-card__name">${title}</p>
        `;
        card.onclick = () => window.openPagePanel(p);
        menuItemsContainer.appendChild(card);
      });

      menuSocialIcons.innerHTML = `
        <a href="https://facebook.com/vanoudedingen" target="_blank" rel="noopener" aria-label="Facebook">
          <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
        </a>
        <a href="https://instagram.com/vanoudedingen" target="_blank" rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37zM17.5 6.5h.01"/></svg>
        </a>
        <a href="https://pinterest.com/vanoudedingen" target="_blank" rel="noopener" aria-label="Pinterest">
          <svg viewBox="0 0 24 24"><path d="M12.16 2C6.4 2 2 6.13 2 11.13c0 2.24.75 4.31 2.05 5.92.2.24.28.56.23.87l-.36 1.8c-.08.4.3.74.7.6l1.7-.58c.28-.1.59-.04.85.12 1.63 1.05 3.5 1.62 5.43 1.62 5.76 0 10.16-4.13 10.16-9.13C22.32 6.13 17.92 2 12.16 2zM10.5 14.5c-.75 0-1.3-.85-1.3-1.87 0-1.02.55-1.86 1.3-1.86 0-1.87-.27-3.15-.8-3.9-.2-.3-.5-.45-.7-.45-.45 0-.7.3-.8.6-.2 1.4-.4 3.2-.4 3.9-.7.75-1.2 1.2-1.2 2.1-.2 1.4.3 2.6 1.1 3.5.7.8 1.7 1.3 2.9 1.3 2.45 0 4.15-2.05 4.15-4.4 0-2.35-1.7-4.4-4.15-4.4C10.6 6.3 9.7 7.2 9.2 8.1c-.2.4-.2.8 0 1.2.2.4.6.5.9.3.2-.2.6-.7.7-1.1.2-.4.4-.7.5-.7.9 0 1.4.7 1.4 1.7 0 1.6-.9 2.5-2.3 2.5z"/></svg>
        </a>
      `;
    };

    (async () => {
      // Attach menu button handler
      const menuBtn = document.querySelector('.header__btn[aria-label="Menu"]');
      if (menuBtn) menuBtn.onclick = openMenu;

      async function fetchDrawerMenuPages() {
        try {
          const slugsToFetch = ['info', 'contact', 'over-mij', 'in-de-media'];
          const fetches = slugsToFetch.map(slug =>
            fetch(`${API}/pages?slug=${slug}&_embed`).then(r => r.json())
          );
          const results = await Promise.all(fetches);
          drawerMenuPages = results.flat();
        } catch (e) {
          console.error("Error fetching drawer menu pages:", e);
          drawerMenuPages = [];
        }
      }

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          const pagePanel = document.getElementById('pagePanel');
          const menuDrawer = document.getElementById('menuDrawer');
          if (pagePanel && pagePanel.classList.contains('open')) {
            window.closePagePanel();
          } else if (menuDrawer && menuDrawer.classList.contains('open')) {
            window.closeMenu();
          }
        }
      });

      try {
        const [catList, posts] = await Promise.all([fetchCats(), fetchPosts()]);
        await getEditorialPages();
        await fetchDrawerMenuPages();
        await renderHero();
        await renderSwiper(catList, posts);
        renderFilters(catList);
        await renderGrid(posts);
        renderEditorial(posts);
        window.renderDrawerMenu();
      } catch(e) {
        console.error(e);
        document.getElementById('heroTitle').innerHTML = 'Van Oude <em>Dingen</em>';
      }
    })();
  </script>
<!-- Hamburger Menu Drawer -->
<div class="panel-overlay" id="menuOverlay" onclick="closeMenu()"></div>
<aside class="menu-drawer" id="menuDrawer" role="dialog" aria-modal="true">
  <div class="menu-drawer__header">
    <button class="menu-drawer__close" onclick="closeMenu()" aria-label="Sluiten">
      <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="menu-drawer__items" id="menuItemsContainer">
    <!-- Menu items will be dynamically inserted here -->
    <!-- Each item will be an image tile -->
  </div>

  <div class="menu-drawer__social" id="menuSocialIcons">
    <!-- Social media icons will be inserted here -->
  </div>
</aside>

<!-- Fullscreen Page Content Panel -->
<div class="panel-overlay" id="pageOverlay" onclick="closePagePanel()"></div>
<aside class="page-panel" id="pagePanel" role="dialog" aria-modal="true">
  <div class="page-panel__drag"></div> <!-- Optional drag handle, consistent with detail-panel -->
  <button class="page-panel__close" onclick="closePagePanel()" aria-label="Sluiten">
    <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <div class="page-panel__content" id="pagePanelContent">
    <!-- Page title, images, and full text content will be dynamically inserted here -->
  </div>
</aside>

</body>
